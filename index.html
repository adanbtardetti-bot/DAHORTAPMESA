<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HortaGestão Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #F3F4F6; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-tab { color: #2D5A27; border-top: 3px solid #2D5A27; background: #f0fdf4; }
        .sugestao-item { border-bottom: 1px solid #eee; padding: 12px; cursor: pointer; background: white; }
    </style>
</head>
<body>
    <header class="bg-[#2D5A27] text-white p-4 text-center font-bold sticky top-0 z-50 shadow">DA HORTA À MESA</header>

    <main class="p-4 pb-24">
        <section id="vendas" class="tab-content active">
            <h2 class="text-xl font-bold mb-4">Novo Pedido</h2>
            <div class="bg-white p-4 rounded-xl shadow-sm mb-4 relative">
                <label class="text-xs font-bold text-gray-400">CLIENTE (BUSCA AUTOMÁTICA)</label>
                <input type="text" id="cli-nome" oninput="buscarCliente(this.value)" placeholder="Digite o nome..." class="w-full p-3 border rounded-lg mb-2 outline-none focus:border-green-500">
                <div id="sugestoes" class="absolute left-0 right-0 shadow-2xl z-50 hidden border rounded-b-lg mx-4"></div>
                
                <input type="text" id="cli-end" placeholder="Endereço / Referência" class="w-full p-3 border rounded-lg mb-2">
                
                <label class="text-xs font-bold text-gray-400">OBSERVAÇÕES DO PEDIDO</label>
                <textarea id="cli-obs" placeholder="Ex: Deixar na portaria, tirar o talo..." class="w-full p-3 border rounded-lg h-20"></textarea>
            </div>
            
            <div id="lista-venda" class="space-y-2"></div>
            <button onclick="salvarPedido()" class="w-full bg-[#2D5A27] text-white font-bold py-4 rounded-xl mt-6 shadow-lg active:scale-95 transition">SALVAR E CADASTRAR CLIENTE</button>
        </section>

        <section id="colheita" class="tab-content">
            <h2 class="text-xl font-bold mb-4 text-green-800">Total para Colheita</h2>
            <div id="resumo-colheita" class="space-y-2"></div>
        </section>

        <section id="expedicao" class="tab-content">
            <h2 class="text-xl font-bold mb-4">Montagem de Pedidos</h2>
            <div id="lista-pendentes" class="space-y-4"></div>
        </section>

        <section id="financeiro" class="tab-content">
            <h2 class="text-xl font-bold mb-4">Controle de Pagamentos</h2>
            <div class="bg-white p-4 rounded-xl mb-6 text-center border-2 border-green-100">
                <p class="text-gray-500 text-xs font-bold uppercase">Total Recebido</p>
                <p id="total-faturado" class="text-4xl font-black text-[#2D5A27]">R$ 0,00</p>
            </div>
            <div id="lista-pagamentos" class="space-y-3"></div>
        </section>

        <section id="estoque" class="tab-content">
            <h2 class="text-xl font-bold mb-4">Gerenciar Produtos</h2>
            <div class="bg-white p-4 rounded-xl mb-4 border shadow-sm">
                <input type="text" id="p-nome" placeholder="Nome do Produto" class="w-full p-2 border rounded mb-2">
                <div class="flex gap-2">
                    <input type="number" id="p-preco" placeholder="Preço R$" class="w-1/2 p-2 border rounded">
                    <select id="p-tipo" class="w-1/2 p-2 border rounded">
                        <option value="un">Unidade</option>
                        <option value="kg">Balança (Kg)</option>
                    </select>
                </div>
                <button onclick="addProduto()" class="w-full bg-green-700 text-white font-bold py-3 rounded-lg mt-3">CADASTRAR NOVO PRODUTO</button>
            </div>
            <div id="lista-estoque" class="space-y-1"></div>
        </section>
    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-between text-[9px] font-bold uppercase text-gray-400 z-50 shadow-2xl">
        <button onclick="showTab('vendas')" class="nav-item flex-1 py-4 active-tab">Vendas</button>
        <button onclick="showTab('colheita')" class="nav-item flex-1 py-4">Colheita</button>
        <button onclick="showTab('expedicao')" class="nav-item flex-1 py-4">Montagem</button>
        <button onclick="showTab('financeiro')" class="nav-item flex-1 py-4">Pago?</button>
        <button onclick="showTab('estoque')" class="nav-item flex-1 py-4">Produtos</button>
    </nav>

    <script>
        let produtos = JSON.parse(localStorage.getItem('h_p')) || [{id:1, nome:'Alface', preco:3.5, tipo:'un'}];
        let pedidos = JSON.parse(localStorage.getItem('h_d')) || [];
        let clientes = JSON.parse(localStorage.getItem('h_c')) || [];

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active-tab');
            renderizar();
        }

        // BUSCA DE CLIENTE SALVO
        function buscarCliente(val) {
            const div = document.getElementById('sugestoes');
            if(val.length < 1) { div.classList.add('hidden'); return; }
            const filtro = clientes.filter(c => c.nome.toLowerCase().includes(val.toLowerCase()));
            if(filtro.length > 0) {
                div.innerHTML = filtro.map(c => `<div class="sugestao-item" onclick="selecionarCli('${c.nome}','${c.end}')"><b>${c.nome}</b><br><small>${c.end}</small></div>`).join('');
                div.classList.remove('hidden');
            } else { div.classList.add('hidden'); }
        }

        function selecionarCli(n, e) {
            document.getElementById('cli-nome').value = n;
            document.getElementById('cli-end').value = e;
            document.getElementById('sugestoes').classList.add('hidden');
        }

        function addProduto() {
            const n = document.getElementById('p-nome').value;
            const p = parseFloat(document.getElementById('p-preco').value);
            const t = document.getElementById('p-tipo').value;
            if(n && p) {
                produtos.push({id: Date.now(), nome: n, preco: p, tipo: t});
                localStorage.setItem('h_p', JSON.stringify(produtos));
                renderizar();
            }
        }

        function mudarQtd(id, v) {
            const el = document.getElementById('q-'+id);
            let n = parseInt(el.innerText) + v;
            if(n >= 0) el.innerText = n;
        }

        // SALVAR PEDIDO E CLIENTE NOVO
        function salvarPedido() {
            const n = document.getElementById('cli-nome').value;
            const e = document.getElementById('cli-end').value;
            const o = document.getElementById('cli-obs').value;
            let itens = [];
            produtos.forEach(p => {
                let q = parseInt(document.getElementById('q-'+p.id).innerText);
                if(q > 0) itens.push({...p, qtd: q, totalItem: p.tipo === 'un' ? (p.preco * q) : 0, faltando: false});
            });

            if(n && itens.length > 0) {
                if(!clientes.find(c => c.nome === n)) { 
                    clientes.push({nome: n, end: e}); 
                    localStorage.setItem('h_c', JSON.stringify(clientes)); 
                }
                pedidos.push({id: Date.now(), cliente: n, endereco: e, observacao: o, itens, status: 'pendente', pago: false});
                localStorage.setItem('h_d', JSON.stringify(pedidos));
                alert("Pedido e Cliente salvos!");
                location.reload();
            } else { alert("Preencha o nome e selecione produtos!"); }
        }

        function marcarFaltando(pIdx, iIdx) {
            pedidos[pIdx].itens[iIdx].faltando = !pedidos[pIdx].itens[iIdx].faltando;
            localStorage.setItem('h_d', JSON.stringify(pedidos));
            renderizar();
        }

        function setValorPeso(pIdx, iIdx, val) {
            pedidos[pIdx].itens[iIdx].totalItem = parseFloat(val) || 0;
            localStorage.setItem('h_d', JSON.stringify(pedidos));
        }

        function renderizar() {
            // Vendas
            document.getElementById('lista-venda').innerHTML = produtos.map(p => `
                <div class="bg-white p-3 rounded-lg flex justify-between items-center border shadow-sm">
                    <div><b>${p.nome}</b><br><small class="text-gray-400">R$ ${p.preco.toFixed(2)} / ${p.tipo}</small></div>
                    <div class="flex items-center gap-3">
                        <button onclick="mudarQtd(${p.id},-1)" class="w-8 h-8 bg-gray-200 rounded font-bold">-</button>
                        <b id="q-${p.id}">0</b>
                        <button onclick="mudarQtd(${p.id},1)" class="w-8 h-8 bg-[#2D5A27] text-white rounded font-bold">+</button>
                    </div>
                </div>
            `).join('');

            // Colheita (Soma itens que não estão faltando)
            let col = {};
            pedidos.filter(p=>p.status==='pendente').forEach(p => {
                p.itens.forEach(i => { if(!i.faltando) col[i.nome] = (col[i.nome] || 0) + i.qtd; });
            });
            document.getElementById('resumo-colheita').innerHTML = Object.entries(col).map(([n,t]) => `
                <div class="bg-white p-4 rounded-xl flex justify-between border-l-4 border-green-600 shadow-sm">
                    <span class="font-bold">${n}</span><span class="text-xl font-black text-green-700">${t}</span>
                </div>
            `).join('') || '<p class="text-center text-gray-400">Sem colheita pendente.</p>';

            // Montagem (Com campo de observação e item faltando)
            document.getElementById('lista-pendentes').innerHTML = pedidos.map((p, pIdx) => p.status === 'pendente' ? `
                <div class="bg-white p-4 rounded-xl shadow border-t-4 border-green-700 mb-4">
                    <div class="font-bold text-lg text-green-900">${p.cliente}</div>
                    <div class="text-xs text-gray-400 mb-1 italic">${p.observacao ? 'OBS: ' + p.observacao : ''}</div>
                    <div class="text-xs text-gray-500 mb-3 border-b pb-2">${p.endereco}</div>
                    ${p.itens.map((it, iIdx) => `
                        <div class="flex flex-col mb-2 p-2 ${it.faltando ? 'bg-red-50 opacity-50' : 'bg-gray-50'} rounded">
                            <div class="flex justify-between items-center">
                                <span class="${it.faltando ? 'line-through text-red-600' : ''}">${it.qtd}x <b>${it.nome}</b></span>
                                <button onclick="marcarFaltando(${pIdx},${iIdx})" class="text-[9px] border px-2 py-1 rounded bg-white font-bold">${it.faltando ? 'VOLTAR' : 'FALTANDO'}</button>
                            </div>
                            ${it.tipo === 'kg' && !it.faltando ? `<input type="number" step="0.01" placeholder="Valor Balança R$" onchange="setValorPeso(${pIdx},${iIdx},this.value)" class="mt-1 p-2 border rounded text-right bg-yellow-50 font-bold">` : ''}
                        </div>
                    `).join('')}
                    <button onclick="pedidos[${pIdx}].status='concluido';localStorage.setItem('h_d',JSON.stringify(pedidos));renderizar()" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold mt-2">PEDIDO PRONTO</button>
                </div>
            ` : '').join('');

            // Financeiro (Botão Pago e Total)
            let fat = 0;
            document.getElementById('lista-pagamentos').innerHTML = pedidos.map((p, pIdx) => p.status === 'concluido' ? `
                <div class="bg-white p-4 rounded-xl flex justify-between items-center border ${p.pago ? 'border-green-500' : 'border-red-300 shadow-lg'}">
                    <div>
                        <b class="text-gray-700">${p.cliente}</b><br>
                        <span class="font-black text-green-700">R$ ${p.itens.reduce((acc,i)=>acc+i.totalItem,0).toFixed(2)}</span>
                    </div>
                    <button onclick="pedidos[${pIdx}].pago=!pedidos[${pIdx}].pago;localStorage.setItem('h_d',JSON.stringify(pedidos));renderizar()" class="px-4 py-2 rounded-lg font-bold text-xs ${p.pago ? 'bg-green-100 text-green-700' : 'bg-red-600 text-white animate-pulse'}">
                        ${p.pago ? '✓ PAGO' : 'PAGAR AGORA'}
                    </button>
                </div>
            ` : '').join('');
            
            pedidos.filter(p=>p.pago).forEach(p => p.itens.forEach(i => fat += i.totalItem));
            document.getElementById('total-faturado').innerText = `R$ ${fat.toFixed(2)}`;

            // Estoque
            document.getElementById('lista-estoque').innerHTML = produtos.map(p => `
                <div class="bg-white p-2 border-b flex justify-between items-center text-sm">
                    <span>${p.nome} - R$ ${p.preco.toFixed(2)}</span>
                    <button onclick="produtos=produtos.filter(x=>x.id!==${p.id});localStorage.setItem('h_p',JSON.stringify(produtos));renderizar();" class="text-red-500 font-bold px-2">Remover</button>
                </div>
            `).join('');
        }
        renderizar();
    </script>
</body>
</html>
